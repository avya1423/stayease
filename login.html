<!DOCTYPE html>
<html>
<head>
  <title>Login - PGKhojo</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

</head>

<body style="text-align:center; margin-top:100px; font-family:Arial;">

<h2>Login 🔐</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script>

// 🔥 TERA REAL FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyABdEEMZ_Q52P5E01Cy2PPmKAAXvHnTetQ",
  authDomain: "pgkhojo-1180e.firebaseapp.com",
  projectId: "pgkhojo-1180e",
  storageBucket: "pgkhojo-1180e.firebasestorage.app",
  messagingSenderId: "976145591846",
  appId: "1:976145591846:web:be2ecc09a15225eb4d80e7"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN FUNCTION
function login() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      alert("Login Success ✅");
      window.location.href = "index.html";
    })
    .catch(err => alert(err.message));
}

</script>

</body>
</html>
