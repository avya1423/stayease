<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - PGKhojo</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:'Segoe UI';
  background:#f4f6fb;
  text-align:center;
  margin:0;
}

.container{
  max-width:400px;
  margin:50px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:20px;
}

input{
  width:90%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff4d4d;
  color:white;
  cursor:pointer;
  width:100%;
}

button:hover{
  background:#e63946;
}

img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>➕ Add New PG</h2>

<input id="name" placeholder="PG Name">
<input id="city" placeholder="City">
<input id="price" placeholder="Price (₹5000)">
<input id="contact" placeholder="Contact Number">
<input id="image" placeholder="Image URL" oninput="previewImg()">

<img id="preview" src="" style="display:none">

<button onclick="addPG()">Add PG</button>

</div>

<script src="data.js"></script>

<script>

// IMAGE PREVIEW
function previewImg(){
  let url = image.value;

  if(url){
    preview.style.display = "block";
    preview.src = url;
  } else {
    preview.style.display = "none";
  }
}

// ADD PG
function addPG(){

  // VALIDATION
  if(!name.value || !city.value || !price.value || !contact.value || !image.value){
    alert("⚠️ Sab fields fill karo");
    return;
  }

  let oldData = JSON.parse(localStorage.getItem("pgData")) || pgData;

  oldData.push({
    name: name.value,
    city: city.value,
    price: price.value,
    contact: contact.value,
    image: image.value
  });

  localStorage.setItem("pgData", JSON.stringify(oldData));

  alert("✅ PG Added Successfully!");

  // CLEAR FORM
  name.value="";
  city.value="";
  price.value="";
  contact.value="";
  image.value="";
  preview.style.display="none";
}

</script>

</body>
</html>
