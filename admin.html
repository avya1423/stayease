<!DOCTYPE html>
<html>
<body style="text-align:center">

<h2>Add PG</h2>

<input id="name" placeholder="Name"><br><br>
<input id="city" placeholder="City"><br><br>
<input id="price" placeholder="Price"><br><br>
<input id="contact" placeholder="Contact"><br><br>
<input id="image" placeholder="Image URL"><br><br>

<button onclick="add()">Add</button>

<script src="data.js"></script>

<script>
function add(){
  let data = JSON.parse(localStorage.getItem("pgData")) || pgData;

  data.push({
    name:name.value,
    city:city.value,
    price:price.value,
    contact:contact.value,
    image:image.value
  });

  localStorage.setItem("pgData", JSON.stringify(data));

  alert("PG Added ✅");
}
</script>

</body>
</html>
