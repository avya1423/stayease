<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - StayEase</title>
</head>
<body>

<h2>Add PG</h2>

<input id="name" placeholder="PG Name"><br><br>
<input id="city" placeholder="City"><br><br>
<input id="price" placeholder="Price"><br><br>
<input id="contact" placeholder="Contact"><br><br>
<input id="image" placeholder="Image URL"><br><br>

<button onclick="addPG()">Add PG</button>

<script>
function addPG() {
  let pg = {
    name: document.getElementById("name").value,
    city: document.getElementById("city").value,
    price: document.getElementById("price").value,
    contact: document.getElementById("contact").value,
    image: document.getElementById("image").value
  };

  let data = JSON.parse(localStorage.getItem("pgData")) || [];
  data.push(pg);

  localStorage.setItem("pgData", JSON.stringify(data));

  alert("PG Added Successfully ✅");
}
</script>

</body>
</html>
