<!DOCTYPE html>
<html>
<head>
  <title>PGKhojo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GOOGLE FONT (UNIQUE TEXT 🔥) -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2 class="logo-text">PGKhojo</h2>
  <a href="login.html">Admin</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1 class="main-title">PGKhojo</h1>
  <p class="tagline">Apna Perfect PG Khojo 🚀</p>

  <div class="search-box">
    <input type="text" id="search" placeholder="Search city...">
    <button onclick="searchPG()">Search</button>
  </div>

  <button class="near-btn" onclick="nearMe()">📍 Near Me</button>
</section>

<!-- RESULTS -->
<section id="results" class="grid"></section>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<div id="chatbox" class="chatbox">
  <div id="chatMessages"></div>
  <input type="text" id="chatInput" placeholder="Ask anything...">
  <button onclick="sendMessage()">Send</button>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
