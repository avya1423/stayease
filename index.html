<!DOCTYPE html>
<html>
<head>
<title>PGKhojo</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2 class="logo">PGKhojo</h2>
  <div>
    <a href="admin.html">Admin</a>
    <a href="contact.html">Contact</a>
    <a href="policy.html">Policy</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Find Your Perfect Stay 🏠</h1>
  <p>From One Home To Another💙</p>

  <div class="search-box">
    <input id="search" placeholder="Search city...">
    <button onclick="searchPG()">Search</button>
  </div>

  <select onchange="filterCity(this.value)">
    <option value="">All Cities</option>
    <option>Bhopal</option>
    <option>Delhi</option>
    <option>Mumbai</option>
    <option>Pune</option>
  </select>
</div>

<!-- RESULTS -->
<div id="results" class="grid"></div>

<!-- CHAT -->
<div class="chatbot">
  <button onclick="toggleChat()">💬</button>
  <div id="chatBox">
    <p>Hi 👋 Ask me about PG</p>
    <input id="chatInput">
    <button onclick="sendMsg()">Send</button>
    <div id="chatOutput"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
  <!-- LOGIN MODAL -->
<div id="loginModal" class="login-modal">
  <div class="login-box">

    <h2>PGKhojo 🏠</h2>
    <p>From one home to another ❤️</p>

    <input type="text" id="username" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">

    <button onclick="loginUser()">Login</button>
    <button onclick="continueGuest()" class="guest">Continue as Guest</button>

  </div>
</div>
<div class="footer">
  
  <p>© 2026 PGKhojo | All Rights Reserved</p>
</div>
</body>
</html>
