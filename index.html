<!DOCTYPE html>
<html>
<head>
<title>PGKhojo</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h2>Loading...</h2>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <h2 class="logo">PGKhojo</h2>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="contact.html">Contact</a>
    <a href="policy.html">Policy</a>
  </div>

  <!-- PROFILE -->
  <div class="profile-container" onclick="toggleProfile()">
    <img id="profilePic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

    <div id="profileMenu" class="profile-menu">

      <p id="userName"></p>

      <!-- SETTINGS -->
      <div id="profileSettings">
        <input type="text" id="newName" placeholder="Update Name">
        <input type="file" onchange="changeDP(event)">
        <button onclick="updateProfile()">Update Profile</button>
      </div>

      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>PGKhojo 🏠</h1>
  <p>From one home to another ❤️</p>

  <div class="search-box">
    <input id="search" placeholder="Search city or PG..." onkeydown="searchOnEnter(event)">
    <button onclick="searchPG()">Search</button>
  </div>

  <!-- FILTER -->
  <div style="margin-top:10px">
    <select onchange="filterCity(this.value)">
      <option value="">All Cities</option>
      <option>Bhopal</option>
      <option>Delhi</option>
      <option>Mumbai</option>
      <option>Pune</option>
      <option>Patna</option>
    </select>

    <select onchange="filterGender(this.value)">
      <option value="">All</option>
      <option>Boys</option>
      <option>Girls</option>
    </select>
  </div>

  <br>
  <button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<!-- RESULTS -->
<div id="results" class="grid"></div>

<!-- ADD PG -->
<div class="login-box" style="margin:20px auto">
  <h3>Add Your PG</h3>

  <input id="pgName" placeholder="PG Name">
  <input id="pgCity" placeholder="City">
  <input id="pgContact" placeholder="Phone">
  <input id="pgEmail" placeholder="Email">

  <button onclick="addPG()">Submit</button>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="login-modal">
  <div class="login-box">

    <h2>Welcome to PGKhojo 🏠</h2>

    <input type="text" id="username" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">

    <button onclick="loginUser()">Login</button>
    <button onclick="continueGuest()" class="guest">Guest</button>

  </div>
</div>

<!-- CHAT -->
<div class="chatbot">
  <button onclick="toggleChat()">💬</button>

  <div id="chatBox">
    <p><b>Assistant 🤖</b></p>

    <input id="chatInput" placeholder="Ask..." onkeydown="chatOnEnter(event)">
    <button onclick="sendMsg()">Send</button>

    <div id="chatOutput"></div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">

  <p>
    Home | Contact Us | Careers | About Us |
    Privacy Policy | Refund Policy | Terms
  </p>

  <p>Available in: Bhopal, Delhi, Mumbai, Pune, Patna</p>

  <p>© 2026 PGKhojo</p>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
