<!DOCTYPE html>
<html>
<head>
<title>PGKhojo</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h2>Loading...</h2>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <h2 class="logo">PGKhojo</h2>

  <!-- PROFILE -->
  <div class="profile-container" onclick="toggleProfile()">
    <img id="profilePic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

    <div id="profileMenu" class="profile-menu">
      <p id="userName"></p>

      <div id="profileSettings">
        <input type="text" id="newName" placeholder="Update Name">
        <input type="file" onchange="changeDP(event)">
        <button onclick="updateProfile()">Update Profile</button>
      </div>

      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>PGKhojo 🏠</h1>
  <p>From one home to another ❤️</p>

  <div class="search-box">
    <input id="search" placeholder="Search..." onkeydown="searchOnEnter(event)">
    <button onclick="searchPG()">Search</button>
  </div>

  <select onchange="filterCity(this.value)">
    <option value="">All Cities</option>
    <option>Bhopal</option>
    <option>Delhi</option>
    <option>Mumbai</option>
    <option>Pune</option>
    <option>Patna</option>
  </select>

  <select onchange="filterGender(this.value)">
    <option value="">All</option>
    <option>Boys</option>
    <option>Girls</option>
  </select>

  <br><br>
  <button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<!-- ADD PG BUTTON -->
<div style="text-align:center; margin:20px;">
  <button onclick="openAddPG()">➕ Add Your PG</button>
</div>

<!-- ADD PG MODAL -->
<div id="pgModal" class="login-modal" style="display:none;">
  <div class="login-box">
    <h3>Add Your PG</h3>

    <input id="pgName" placeholder="PG Name">
    <input id="pgCity" placeholder="City">
    <input id="pgContact" placeholder="Phone">
    <input id="pgEmail" placeholder="Email">

    <button onclick="addPG()">Submit</button>
    <button onclick="closeAddPG()">Cancel</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="grid"></div>

<!-- LOGIN -->
<div id="loginModal" class="login-modal">
  <div class="login-box">
    <h2>Welcome 🏠</h2>

    <input id="username" placeholder="Name">
    <input id="email" placeholder="Email">

    <button onclick="loginUser()">Login</button>
    <button onclick="continueGuest()">Guest</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <p>
    <a href="#">Home</a> |
    <a href="#">Contact</a> |
    <a href="#">About</a> |
    <a href="#">Policy</a>
  </p>
  <p>Available: Bhopal, Delhi, Mumbai, Pune, Patna</p>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
